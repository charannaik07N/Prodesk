<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dev-Detective</title>
    <link rel="stylesheet" href="style.css" />

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap");

      :root {
        --bg: #f6f8fc;
        --panel: #ffffff;
        --stroke: #dbe3f0;
        --text-main: #1f2937;
        --text-soft: #5b6780;
        --accent: #2f7ef7;
      }

      body {
        font-family: "Nunito", sans-serif;
        color: var(--text-main);
        background:
          radial-gradient(circle at 0% 0%, #eef4ff 0, transparent 35%),
          radial-gradient(circle at 100% 0%, #f4f8ff 0, transparent 28%),
          var(--bg);
      }

      .mono {
        font-family: "JetBrains Mono", monospace;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--stroke);
        box-shadow: 0 10px 30px rgba(16, 24, 40, 0.06);
      }

      .winner-card {
        background-color: #ecfdf3;
        border: 2px solid #22c55e;
        box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.12);
      }

      .loser-card {
        background-color: #fff1f2;
        border: 2px solid #ef4444;
        box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.12);
      }
    </style>
  </head>
  <body class="min-h-screen bg-slate-50">
    <main class="w-full min-h-screen">
      <section class="panel min-h-screen w-full p-4 md:p-6">
        <header
          class="mb-6 flex flex-col gap-3 md:flex-row md:items-end md:justify-between"
        >
          <div>
            <h1
              class="text-2xl font-extrabold tracking-tight text-slate-800 md:text-4xl"
            >
              The Mission: "Dev-Detective"
            </h1>
            <p class="mt-2 max-w-2xl text-sm text-slate-500 md:text-base">
              Hunt GitHub profiles, inspect repositories, and challenge two
              developers in battle mode.
            </p>
          </div>

          <div
            class="panel inline-flex items-center gap-3 rounded-2xl px-4 py-3"
          >
            <span class="mono text-xs uppercase tracking-widest text-slate-500"
              >Search</span
            >
            <label
              for="battle-mode-toggle"
              class="relative inline-flex cursor-pointer items-center"
            >
              <input
                id="battle-mode-toggle"
                type="checkbox"
                class="peer sr-only"
              />
              <div
                class="h-7 w-14 rounded-full bg-slate-200 ring-1 ring-slate-300 transition peer-checked:bg-blue-500 peer-focus-visible:outline peer-focus-visible:outline-2 peer-focus-visible:outline-blue-400"
              ></div>
              <div
                class="absolute left-1 top-1 h-5 w-5 rounded-full bg-white shadow transition-transform duration-300 peer-checked:translate-x-7"
              ></div>
            </label>
            <span class="mono text-xs uppercase tracking-widest text-blue-600"
              >Battle</span
            >
          </div>
        </header>

        <div id="search-section" class="space-y-5">
          <div class="panel rounded-2xl p-3 md:p-4">
            <input
              id="search-input"
              type="text"
              placeholder="Search for a developer and press Enter"
              class="w-full rounded-xl border border-slate-300 bg-white px-4 py-3 text-sm text-slate-800 outline-none transition placeholder:text-slate-400 focus:border-blue-400 focus:ring-2 focus:ring-blue-200"
            />
          </div>

          <article
            id="profile-card-1"
            class="panel rounded-3xl p-5 transition md:p-6"
          >
            <div class="flex flex-col gap-5 sm:flex-row sm:items-start">
              <img
                id="profile-picture-1"
                src="https://via.placeholder.com/80"
                alt="Profile Picture"
                class="h-20 w-20 rounded-2xl border border-slate-200 object-cover shadow-sm"
              />

              <div class="min-w-0 flex-1 space-y-1">
                <h2 id="name-1" class="text-xl font-bold text-slate-800"></h2>
                <p id="title-1" class="text-sm text-slate-600"></p>
                <p id="join-date-1" class="text-sm text-slate-600"></p>
                <p
                  id="portfolio-url-1"
                  class="text-sm text-blue-600 break-all"
                ></p>
                <p
                  id="followers-1"
                  class="mono text-xs uppercase tracking-wide text-slate-500"
                ></p>
              </div>
            </div>

            <div class="mt-6">
              <h3 class="mono text-xs uppercase tracking-[0.2em] text-blue-600">
                Latest Repositories
              </h3>
              <ul id="repo-list-1" class="mt-3 space-y-2"></ul>
              <p id="repo-empty-1" class="mt-2 text-sm text-slate-500 hidden">
                No repositories found.
              </p>
            </div>
          </article>
        </div>

        <div id="battle-section" class="hidden space-y-5">
          <div class="panel rounded-2xl p-3 md:p-4">
            <div class="grid grid-cols-1 gap-3 md:grid-cols-[1fr_1fr_auto]">
              <input
                id="battle-input-1"
                type="text"
                placeholder="Username 1"
                class="rounded-xl border border-slate-300 bg-white px-4 py-3 text-sm text-slate-800 outline-none transition placeholder:text-slate-400 focus:border-blue-400 focus:ring-2 focus:ring-blue-200"
              />
              <input
                id="battle-input-2"
                type="text"
                placeholder="Username 2"
                class="rounded-xl border border-slate-300 bg-white px-4 py-3 text-sm text-slate-800 outline-none transition placeholder:text-slate-400 focus:border-blue-400 focus:ring-2 focus:ring-blue-200"
              />
              <button
                id="battle-button"
                type="button"
                class="rounded-xl bg-blue-600 px-6 py-3 font-bold text-white transition hover:bg-blue-500 active:scale-[0.99]"
              >
                Battle
              </button>
            </div>
          </div>

          <div class="grid grid-cols-1 gap-4 xl:grid-cols-2">
            <article
              id="profile-card-3"
              class="panel rounded-3xl p-5 transition md:p-6"
            >
              <div class="flex flex-col gap-5 sm:flex-row sm:items-start">
                <img
                  id="profile-picture-3"
                  src="https://via.placeholder.com/80"
                  alt="Profile Picture"
                  class="h-20 w-20 rounded-2xl border border-slate-200 object-cover shadow-sm"
                />
                <div class="min-w-0 flex-1 space-y-1">
                  <h2 id="name-3" class="text-xl font-bold text-slate-800"></h2>
                  <p id="title-3" class="text-sm text-slate-600"></p>
                  <p id="join-date-3" class="text-sm text-slate-600"></p>
                  <p
                    id="portfolio-url-3"
                    class="text-sm text-blue-600 break-all"
                  ></p>
                  <p
                    id="followers-3"
                    class="mono text-xs uppercase tracking-wide text-slate-500"
                  ></p>
                  <p
                    id="stars-3"
                    class="mono text-xs uppercase tracking-wide text-slate-500"
                  ></p>
                </div>
              </div>
              <div class="mt-6">
                <h3
                  class="mono text-xs uppercase tracking-[0.2em] text-blue-600"
                >
                  Latest Repositories
                </h3>
                <ul id="repo-list-3" class="mt-3 space-y-2"></ul>
                <p id="repo-empty-3" class="mt-2 text-sm text-slate-500 hidden">
                  No repositories found.
                </p>
              </div>
            </article>

            <article
              id="profile-card-2"
              class="panel rounded-3xl p-5 transition md:p-6"
            >
              <div class="flex flex-col gap-5 sm:flex-row sm:items-start">
                <img
                  id="profile-picture-2"
                  src="https://via.placeholder.com/80"
                  alt="Profile Picture"
                  class="h-20 w-20 rounded-2xl border border-slate-200 object-cover shadow-sm"
                />
                <div class="min-w-0 flex-1 space-y-1">
                  <h2 id="name-2" class="text-xl font-bold text-slate-800"></h2>
                  <p id="title-2" class="text-sm text-slate-600"></p>
                  <p id="join-date-2" class="text-sm text-slate-600"></p>
                  <p
                    id="portfolio-url-2"
                    class="text-sm text-blue-600 break-all"
                  ></p>
                  <p
                    id="followers-2"
                    class="mono text-xs uppercase tracking-wide text-slate-500"
                  ></p>
                  <p
                    id="stars-2"
                    class="mono text-xs uppercase tracking-wide text-slate-500"
                  ></p>
                </div>
              </div>
              <div class="mt-6">
                <h3
                  class="mono text-xs uppercase tracking-[0.2em] text-blue-600"
                >
                  Latest Repositories
                </h3>
                <ul id="repo-list-2" class="mt-3 space-y-2"></ul>
                <p id="repo-empty-2" class="mt-2 text-sm text-slate-500 hidden">
                  No repositories found.
                </p>
              </div>
            </article>
          </div>
        </div>
      </section>
    </main>

    <script src="/index.js"></script>
  </body>
</html>
