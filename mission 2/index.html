<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mission 2 - Cash Flow Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  </head>
  <body class="min-h-screen bg-stone-100 font-[Sora] text-stone-900">
    <main class="mx-auto max-w-6xl px-4 py-6 sm:px-8 sm:py-10">
      <section
        class="mb-7 rounded-2xl border border-stone-300 bg-white p-6 shadow-sm sm:p-8"
      >
        <p
          class="mb-3 inline-block rounded-md bg-stone-900 px-3 py-1 text-xs font-semibold tracking-[0.15em] text-stone-50"
        >
          MISSION 2
        </p>
        <h1 class="text-3xl font-bold leading-tight sm:text-4xl">
          Cash Flow Dashboard
        </h1>
        <p
          class="mt-3 max-w-3xl text-sm leading-relaxed text-stone-600 sm:text-base"
        >
          A simple place to log income, add expenses, and keep an eye on what is
          left.
        </p>
      </section>

      <section class="grid gap-4 md:grid-cols-2">
        <div class="rounded-2xl border border-stone-300 bg-white p-5 shadow-sm">
          <h2 class="mb-4 text-lg font-semibold sm:text-xl">Enter Salary</h2>
          <div class="flex flex-col gap-3 sm:flex-row">
            <input
              type="number"
              id="salaryInput"
              placeholder="Enter Total Salary"
              class="w-full rounded-lg border border-stone-300 bg-stone-50 px-4 py-3 text-stone-800 outline-none transition focus:border-stone-500 focus:ring-2 focus:ring-stone-200"
            />
            <button
              id="setSalaryBtn"
              class="rounded-lg bg-stone-900 px-5 py-3 font-medium text-stone-100 transition hover:bg-stone-700"
            >
              Set Salary
            </button>
          </div>
          <h3 class="mt-4 text-base font-medium text-stone-600">
            Total Salary:
            <span id="salaryDisplay" class="font-bold text-teal-700">0</span>
          </h3>
        </div>

        <div class="rounded-2xl border border-stone-300 bg-white p-5 shadow-sm">
          <h2 class="mb-4 text-lg font-semibold sm:text-xl">Add Expense</h2>
          <div class="flex flex-col gap-3">
            <input
              type="text"
              id="expenseName"
              placeholder="Expense Name"
              class="w-full rounded-lg border border-stone-300 bg-stone-50 px-4 py-3 text-stone-800 outline-none transition focus:border-stone-500 focus:ring-2 focus:ring-stone-200"
            />
            <input
              type="number"
              id="expenseAmount"
              placeholder="Expense Amount"
              class="w-full rounded-lg border border-stone-300 bg-stone-50 px-4 py-3 text-stone-800 outline-none transition focus:border-stone-500 focus:ring-2 focus:ring-stone-200"
            />
            <button
              id="addExpenseBtn"
              class="rounded-lg bg-teal-700 px-5 py-3 font-medium text-stone-100 transition hover:bg-teal-800"
            >
              Add Expense
            </button>
          </div>
        </div>

        <div class="rounded-2xl border border-stone-300 bg-white p-5 shadow-sm">
          <h2 class="mb-4 text-lg font-semibold sm:text-xl">Expenses List</h2>
          <ul id="expenseList" class="divide-y divide-stone-200 text-stone-700">
            <!-- Expenses will appear here -->
          </ul>
        </div>

        <div class="rounded-2xl border border-stone-300 bg-white p-5 shadow-sm">
          <h2 class="mb-3 text-lg font-semibold sm:text-xl">Balance</h2>
          <p class="text-lg text-stone-700">
            Remaining Balance:
            <span id="balance" class="font-bold text-teal-700">0</span>
          </p>

          <h2 class="mt-6 mb-3 text-lg font-semibold sm:text-xl">
            Currency Converter
          </h2>
          <select
            id="currencySelector"
            class="w-full rounded-lg border border-stone-300 bg-stone-50 px-4 py-3 text-stone-800 outline-none transition focus:border-stone-500 focus:ring-2 focus:ring-stone-200"
          >
            <option value="INR">INR (₹)</option>
            <option value="USD">USD ($)</option>
          </select>
        </div>
      </section>

      <section class="mt-4 grid gap-4 lg:grid-cols-[1.3fr_1fr]">
        <div class="rounded-2xl border border-stone-300 bg-white p-5 shadow-sm">
          <h2 class="mb-4 text-lg font-semibold sm:text-xl">Chart</h2>
          <div class="rounded-lg border border-stone-300 bg-stone-50 p-4">
            <canvas
              id="expenseChart"
              width="300"
              height="300"
              class="mx-auto"
            ></canvas>
          </div>
        </div>

        <div class="rounded-2xl border border-stone-300 bg-white p-5 shadow-sm">
          <h2 class="mb-4 text-lg font-semibold sm:text-xl">Download Report</h2>
          <button
            id="downloadPDF"
            class="w-full rounded-lg bg-stone-900 px-5 py-3 font-medium text-stone-100 transition hover:bg-stone-700"
          >
            Download Report (PDF)
          </button>

          <h2 class="mt-6 mb-2 text-lg font-semibold sm:text-xl">Alert</h2>
          <p
            id="alertMessage"
            class="rounded-lg border border-amber-300 bg-amber-50 px-4 py-3 text-amber-800"
          ></p>
        </div>
      </section>
    </main>
  </body>
  <script src="index.js"></script>
</html>
